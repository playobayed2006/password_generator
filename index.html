<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Generator</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>


<div class="container">

    <div class="card2">

        <h2>Recent Generation</h2>

        <div class="output3-main">
            <div class="output3">
                <div class="search-container">
                    <span id="recent">Recent Password 1</span>
                </div>
            </div>
            <div class="output3">
                <div class="search-container">
                    <span id="recent">Recent Password 2</span>
                </div>
            </div>
            <div class="output3">
                <div class="search-container">
                    <span id="recent">Recent Password 3</span>
                </div>
            </div>
            <div class="output3">
                <div class="search-container">
                    <span id="recent">Recent Password 4</span>
                </div>
            </div>
            <div class="output3">
                <div class="search-container">
                    <span id="recent">Recent Password 5</span>
                </div>
            </div>
            <div class="output3">
                <div class="search-container">
                    <span id="recent">Recent Password 6</span>
                </div>
            </div>
        </div>
 
    </div>

    <!-- ................................... -->
    <div class="card">

        <h2>Password Generator</h2>

        <!-- Password Output -->
        <div class="output">
            <span id="password">Generated Password</span>
            <button id="copyBtn">Copy</button>
        </div>

        
        <!-- Length -->
        <div class="settings">
            <div class="range-group">
                <label>
                    Length: <span id="lengthVal">12</span>
                </label>
                <input type="range" id="length" min="6" max="20" value="12">
            </div>

            
            <!-- Checkboxes -->
            <div class="checkboxes">
                <label><input type="checkbox" id="lower" checked> Lowercase</label>
                <label><input type="checkbox" id="upper" checked> Uppercase</label>
                <label><input type="checkbox" id="numbers" checked> Numbers</label>
                <label><input type="checkbox" id="symbols" checked> Symbols</label>
            </div>
        </div>

        
        <!-- Button -->
        <button class="btn" id="generate">Generate Password</button>
        <button class="btn" id="save">Save Password</button>

        
        <!-- Strength -->
        <div class="strength">
            <span id="strengthText">Strength: Weak</span>
        </div>

        <div class="strength-bar">
            <div id="bar"></div>
        </div>

    </div>
<!-- ............................................. -->

    <div class="card2">

        <h2>Password Saver</h2>

        <div class="output2">
            <div class="search-container">
                <input type="search" id="search" placeholder="Search passwords...">
                <button id="copyBtn">Search</button>
            </div>
        </div>
    </div>
</div>


<!-- Toast -->
<div class="toast" id="toast">Copied!</div>

<script src="js/script.js"></script>

</body>
</html>
